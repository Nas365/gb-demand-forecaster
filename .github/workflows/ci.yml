name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # Stop the build on syntax errors or undefined names.
          flake8 app.py features.py live_data.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Treat everything else as warnings only.
          flake8 app.py features.py live_data.py --count --exit-zero --max-line-length=100 --statistics

      - name: Verify the app imports cleanly
        run: |
          python -c "import ast; [ast.parse(open(f).read()) for f in ['app.py','features.py','live_data.py']]; print('All files parse OK')"
